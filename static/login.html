<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HR-Agent · Sign in</title>
<link rel="stylesheet" href="/static/css/app.css">
<style>
  body { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
  .card .seg { background: var(--paper); margin: 20px 0 6px; }
  .card .seg button[aria-pressed="true"] { background: var(--panel); }
</style>
</head>
<body>
<div class="card">
  <h1 style="font-size:21px;font-weight:650;letter-spacing:-0.01em;">HR-Agent</h1>
  <p style="color:var(--ink-soft);margin-top:6px;font-size:14px;" id="sub">Sign in to analyze resumes and build better ones.</p>

  <div class="seg" role="tablist">
    <button type="button" id="tab-login" aria-pressed="true">Sign in</button>
    <button type="button" id="tab-register" aria-pressed="false">Create account</button>
  </div>

  <form id="form">
    <label for="email">Email</label>
    <input type="email" id="email" required autocomplete="email" placeholder="you@company.com">
    <label for="password">Password</label>
    <input type="password" id="password" required autocomplete="current-password" placeholder="********">
    <p class="hint hidden" id="pw-hint">At least 8 characters.</p>
    <button class="run" id="submit" type="submit">Sign in</button>
  </form>

  <div id="error" class="error hidden"></div>
</div>

<script src="/static/js/api.js"></script>
<script>
(function () {
  "use strict";
  const $ = id => document.getElementById(id);
  let mode = "login";

  function setMode(m) {
    mode = m;
    $("tab-login").setAttribute("aria-pressed", String(m === "login"));
    $("tab-register").setAttribute("aria-pressed", String(m === "register"));
    $("submit").textContent = m === "login" ? "Sign in" : "Create account";
    $("sub").textContent = m === "login"
      ? "Sign in to analyze resumes and build better ones."
      : "Create an account to get started.";
    $("pw-hint").classList.toggle("hidden", m !== "register");
    $("password").autocomplete = m === "login" ? "current-password" : "new-password";
    $("error").classList.add("hidden");
  }
  $("tab-login").addEventListener("click", () => setMode("login"));
  $("tab-register").addEventListener("click", () => setMode("register"));

  $("form").addEventListener("submit", async e => {
    e.preventDefault();
    const btn = $("submit");
    btn.disabled = true;
    $("error").classList.add("hidden");
    try {
      const res = await fetch("/api/" + mode, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: $("email").value.trim(), password: $("password").value }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || data.error || "Request failed");
      location = "/";
    } catch (err) {
      const el = $("error");
      el.textContent = err.message;
      el.classList.remove("hidden");
    } finally {
      btn.disabled = false;
    }
  });
})();
</script>
</body>
</html>
