<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HR-Agent · Sign in</title>
<style>
  :root {
    --ink: oklch(24% 0.012 260);
    --ink-soft: oklch(45% 0.014 260);
    --ink-faint: oklch(62% 0.012 260);
    --paper: oklch(98.4% 0.004 260);
    --panel: oklch(96.2% 0.006 260);
    --line: oklch(90% 0.008 260);
    --accent: oklch(52% 0.15 258);
    --accent-soft: oklch(94% 0.03 258);
    --bad: oklch(55% 0.16 25);
    --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
  }
  * { margin: 0; box-sizing: border-box; }
  body {
    font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh; display: grid; place-items: center; padding: 24px;
  }
  .card {
    width: 100%; max-width: 380px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
    padding: 32px 28px;
  }
  h1 { font-size: 21px; font-weight: 650; letter-spacing: -0.01em; }
  .sub { color: var(--ink-soft); margin-top: 6px; font-size: 14px; }
  .seg { display: inline-flex; background: var(--paper); border: 1px solid var(--line); border-radius: 8px; padding: 3px; margin: 20px 0 18px; }
  .seg button {
    border: 0; background: transparent; font: inherit; font-size: 13px; font-weight: 550;
    color: var(--ink-soft); padding: 5px 14px; border-radius: 6px; cursor: pointer;
    transition: background 150ms var(--ease-out), color 150ms var(--ease-out), transform 120ms var(--ease-out);
  }
  .seg button:active { transform: scale(0.97); }
  .seg button[aria-pressed="true"] { background: var(--panel); color: var(--ink); box-shadow: 0 1px 2px oklch(0% 0 0 / 0.07); }
  label { display: block; font-size: 13px; font-weight: 600; color: var(--ink-soft); margin: 14px 0 6px; }
  input {
    width: 100%; font: inherit; color: var(--ink);
    background: var(--paper); border: 1px solid var(--line); border-radius: 8px;
    padding: 10px 12px; transition: border-color 150ms var(--ease-out), box-shadow 150ms var(--ease-out);
  }
  input:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px oklch(52% 0.15 258 / 0.15);
  }
  .hint { font-size: 12.5px; color: var(--ink-faint); margin-top: 6px; }
  .run {
    margin-top: 22px; width: 100%;
    background: var(--accent); color: oklch(99% 0.003 258);
    border: 0; border-radius: 9px; font: inherit; font-size: 15px; font-weight: 600;
    padding: 12px; cursor: pointer;
    transition: transform 140ms var(--ease-out), opacity 150ms var(--ease-out), filter 150ms var(--ease-out);
  }
  .run:hover { filter: brightness(1.07); }
  .run:active { transform: scale(0.985); }
  .run:disabled { opacity: 0.45; cursor: not-allowed; }
  .error {
    margin-top: 16px; padding: 12px 14px; border-radius: 9px;
    background: oklch(95% 0.03 25); color: var(--bad); font-size: 14px;
  }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="card">
  <h1>HR-Agent</h1>
  <p class="sub" id="sub">Sign in to analyze resumes and build better ones.</p>

  <div class="seg" role="tablist">
    <button type="button" id="tab-login" aria-pressed="true">Sign in</button>
    <button type="button" id="tab-register" aria-pressed="false">Create account</button>
  </div>

  <form id="form">
    <label for="email">Email</label>
    <input type="email" id="email" required autocomplete="email" placeholder="you@company.com">
    <label for="password">Password</label>
    <input type="password" id="password" required autocomplete="current-password" placeholder="********">
    <p class="hint hidden" id="pw-hint">At least 8 characters.</p>
    <button class="run" id="submit" type="submit">Sign in</button>
  </form>

  <div id="error" class="error hidden"></div>
</div>

<script>
const $ = id => document.getElementById(id);
let mode = "login";

function setMode(m) {
  mode = m;
  $("tab-login").setAttribute("aria-pressed", String(m === "login"));
  $("tab-register").setAttribute("aria-pressed", String(m === "register"));
  $("submit").textContent = m === "login" ? "Sign in" : "Create account";
  $("sub").textContent = m === "login"
    ? "Sign in to analyze resumes and build better ones."
    : "Create an account to get started.";
  $("pw-hint").classList.toggle("hidden", m !== "register");
  $("password").autocomplete = m === "login" ? "current-password" : "new-password";
  $("error").classList.add("hidden");
}
$("tab-login").addEventListener("click", () => setMode("login"));
$("tab-register").addEventListener("click", () => setMode("register"));

$("form").addEventListener("submit", async e => {
  e.preventDefault();
  const btn = $("submit");
  btn.disabled = true;
  $("error").classList.add("hidden");
  try {
    const res = await fetch("/api/" + mode, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: $("email").value.trim(), password: $("password").value }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.detail || data.error || "Request failed");
    location = "/";
  } catch (err) {
    const el = $("error");
    el.textContent = err.message;
    el.classList.remove("hidden");
  } finally {
    btn.disabled = false;
  }
});
</script>
</body>
</html>
